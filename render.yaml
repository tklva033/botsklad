databases:
  - name: bot-sklad-db
    databaseName: bot_sklad
    user: bot_sklad
    plan: free

services:
  - type: web
    name: bot-sklad-app
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: 3000
      - key: TELEGRAM_API_BASE
        value: https://api.telegram.org
      - key: TELEGRAM_TRANSPORT
        value: webhook
      - key: TELEGRAM_WEBHOOK_PATH
        value: /telegram/webhook
      - key: DB_INIT_ON_START
        value: true
      - key: EMBEDDED_POSTGRES_ENABLED
        value: false
      - key: UPLOADS_DIR
        value: ./uploads
      - key: REPORTS_DIR
        value: ./reports
      - key: SCHEDULER_ENABLED
        value: true
      - key: SCHEDULER_INTERVAL_MS
        value: 30000
      - key: DATABASE_URL
        fromDatabase:
          name: bot-sklad-db
          property: connectionString
      - key: BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
